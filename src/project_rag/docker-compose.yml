services:

  # ── Local LLM runtime ──────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # ── GPU support: uncomment if you have an NVIDIA GPU + Container Toolkit ──
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── Vector database ────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.20
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
    restart: unless-stopped

  # ── RAG API (custom FastAPI service) ───────────────────────────────────────
  rag-api:
    build: .
    container_name: rag-api
    ports:
      - "8001:8001"
    volumes:
      - ./data:/data
    environment:
      - OLLAMA_URL=http://ollama:11434
      - CHROMA_URL=http://chromadb:8000
      - EMBED_MODEL=nomic-embed-text   # Local embedding model via Ollama
      - CHAT_MODEL=llama3.2            # Change to llama3.1:70b for a bigger model
    depends_on:
      - ollama
      - chromadb
    restart: unless-stopped

  # ── Stakeholder chat UI ────────────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      # Point to our RAG API as an OpenAI-compatible endpoint
      - OPENAI_API_BASE_URL=http://rag-api:8001/v1
      - OPENAI_API_KEY=not-needed
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      - ollama
      - rag-api
    restart: unless-stopped

volumes:
  ollama_data:
  chroma_data:
  open_webui_data:
